name = "wc26terminal"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

# Serve the built SPA from dist/ via the ASSETS binding.
# run_worker_first routes /api/* to the Worker BEFORE asset/SPA handling — without it,
# single-page-application not-found handling would return index.html for /api/* and the
# Worker would never run. Everything else is served straight from dist/.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
